<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart – ShopEase</title>
    <meta name="description" content="Review your shopping cart, apply coupons, and proceed to checkout on ShopEase." />
    <link rel="stylesheet" href="styles.css" />
    <script
        src="https://cdn.c360a.salesforce.com/beacon/c360a/8842efab-59fa-426b-980d-b80e8fdeb8ed/scripts/c360a.min.js"></script>
</head>

<body>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- Header -->
    <header class="site-header" id="siteHeader"></header>

    <main>
        <div class="container cart-page-content">
            <h1 style="font-size:28px;font-weight:800;margin-bottom:24px;">🛒 Shopping Cart <span id="cartCountLabel"
                    style="font-size:16px;color:var(--text-secondary);font-weight:400;"></span></h1>
            <div id="cartContent"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer" id="siteFooter"></footer>

    <script src="shared.js"></script>
    <script>
        function renderCart() {
            const container = document.getElementById('cartContent');
            const countLabel = document.getElementById('cartCountLabel');
            const cart = getCart();

            if (cart.length === 0) {
                countLabel.textContent = '';
                container.innerHTML = `
          <div class="empty-cart">
            <div class="emoji">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added anything yet. Start shopping to fill it up!</p>
            <a href="index.html" class="btn btn-primary-std">Start Shopping →</a>
          </div>
        `;
                return;
            }

            const count = getCartCount();
            countLabel.textContent = `(${count} items)`;
            const subtotal = getSubtotal();
            const shipping = getShipping();
            const discount = getDiscount();
            const total = getTotal();

            const itemsHTML = cart.map(item => {
                const p = products.find(pr => pr.id === item.productId);
                if (!p) return '';
                const emoji = productEmojis[p.image] || '📦';
                return `
          <div class="cart-card">
            <div class="cart-card-img">${emoji}</div>
            <div class="cart-card-details">
              <div class="cart-card-top">
                <a href="product-detail.html?id=${p.id}" class="cart-card-name">${p.name}</a>
                <button class="remove-btn" onclick="removeFromCart(${p.id});renderCart();showToast('Item removed');">✕ Remove</button>
              </div>
              <div class="cart-card-price-row">
                <span class="product-price">${formatPrice(p.price * item.quantity)}</span>
                <span class="product-original-price">${formatPrice(p.originalPrice * item.quantity)}</span>
              </div>
              <div class="qty-selector">
                <button class="qty-btn" onclick="updateQuantity(${p.id},${item.quantity - 1});renderCart();">−</button>
                <span class="qty-val">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQuantity(${p.id},${item.quantity + 1});renderCart();">+</button>
              </div>
            </div>
          </div>
        `;
            }).join('');

            container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items-list">${itemsHTML}</div>
          <div class="cart-sidebar">
            <div class="coupon-card">
              <h4>🏷️ Have a coupon?</h4>
              <div class="coupon-row">
                <input type="text" placeholder="Enter coupon code" />
                <button onclick="showToast('Coupon applied! 🎉')">Apply</button>
              </div>
            </div>
            <div class="summary-card">
              <h3>Order Summary</h3>
              <div class="summary-row"><span class="label">Subtotal (${count} items)</span><span class="value">${formatPrice(subtotal)}</span></div>
              <div class="summary-row"><span class="label">Shipping</span><span class="value">${shipping === 0 ? 'FREE' : formatPrice(shipping)}</span></div>
              <div class="summary-row discount"><span class="label">Discount (10%)</span><span class="value">-${formatPrice(discount)}</span></div>
              <div class="summary-row total"><span class="label">Total</span><span class="value">${formatPrice(total)}</span></div>
              <a href="payment.html" class="btn btn-primary-full">Proceed to Checkout →</a>
            </div>
          </div>
        </div>
      `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderHeader('siteHeader');
            renderFooter('siteFooter');
            renderCart();
        });
    </script>
</body>

</html>
