<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase – Premium Online Shopping</title>
  <meta name="description"
    content="ShopEase – Discover amazing deals on electronics, fashion, home decor, beauty and more. Shop with confidence." />
  <link rel="stylesheet" href="styles.css" />
  <script
    src="https://cdn.c360a.salesforce.com/beacon/c360a/8842efab-59fa-426b-980d-b80e8fdeb8ed/scripts/c360a.min.js"></script>
</head>

<body>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- Header -->
  <header class="site-header" id="siteHeader"></header>

  <main>
    <div class="container" style="padding-top:32px;">
      <!-- Hero Banner -->
      <div class="hero-banner" id="heroBanner">
        <div class="hero-track" id="heroTrack"></div>
        <div class="hero-dots" id="heroDots"></div>
      </div>

      <!-- Categories -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">🛒 Shop by Category</h2>
          <a href="products.html?cat=0&name=All%20Products" class="see-all">View All Products →</a>
        </div>
        <div class="categories-grid" id="categoriesGrid"></div>
      </div>

      <!-- Flash Deals -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">⚡ Flash Deals</h2>
          <a href="products.html?cat=0&name=All%20Products" class="see-all">See All →</a>
        </div>
        <div class="products-row" id="flashDealsRow"></div>
      </div>

      <!-- Recommended -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">✨ Recommended For You</h2>
        </div>
        <div class="products-grid" id="recommendedGrid"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer" id="siteFooter"></footer>

  <script src="shared.js"></script>
  <script>
    // ============ HOME PAGE LOGIC ============
    let bannerIndex = 0;
    let bannerInterval;

    function renderHomePage() {
      renderHeader('siteHeader');
      renderFooter('siteFooter');

      // Hero Banner
      const track = document.getElementById('heroTrack');
      const dots = document.getElementById('heroDots');
      track.innerHTML = banners.map(b => `
        <div class="hero-slide" style="background:${b.gradient}">
          <span class="hero-badge">${b.badge}</span>
          <h2 class="hero-title">${b.title}</h2>
          <p class="hero-subtitle">${b.subtitle}</p>
          <a href="products.html?cat=0&name=All%20Products" class="hero-cta">Shop Now →</a>
        </div>
      `).join('');
      dots.innerHTML = banners.map((_, i) => `<div class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goToBanner(${i})"></div>`).join('');

      clearInterval(bannerInterval);
      bannerIndex = 0;
      bannerInterval = setInterval(() => {
        bannerIndex = (bannerIndex + 1) % banners.length;
        goToBanner(bannerIndex);
      }, 5000);

      // Categories Grid
      document.getElementById('categoriesGrid').innerHTML = categories.map(c => `
        <a href="products.html?cat=${c.id}&name=${encodeURIComponent(c.name)}" class="category-card">
          <span class="emoji">${c.icon}</span>
          <span class="name">${c.name}</span>
          <span class="count">${c.count}+ items</span>
        </a>
      `).join('');

      // Flash Deals
      document.getElementById('flashDealsRow').innerHTML = shuffle(products).slice(0, 6).map(productCardHTML).join('');

      // Recommended
      document.getElementById('recommendedGrid').innerHTML = shuffle(products).slice(0, 8).map(productCardHTML).join('');
    }

    function goToBanner(index) {
      bannerIndex = index;
      document.getElementById('heroTrack').style.transform = `translateX(-${index * 100}%)`;
      document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }

    // Check for login redirect
    document.addEventListener('DOMContentLoaded', () => {
      renderHomePage();
      if (getUrlParam('loggedIn') === 'true') {
        setTimeout(() => showToast('Logged in successfully! 🎉'), 300);
        // Clean the URL
        window.history.replaceState({}, '', 'index.html');
      }
    });
  </script>
</body>

</html>
