<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – ShopEase</title>
    <meta name="description"
        content="Sign in to your ShopEase account to access your cart, orders, and personalized deals." />
    <link rel="stylesheet" href="styles.css" />
    <script
        src="https://cdn.c360a.salesforce.com/beacon/c360a/8842efab-59fa-426b-980d-b80e8fdeb8ed/scripts/c360a.min.js"></script>
</head>

<body>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- LOGIN PAGE -->
    <div class="login-page-wrapper">
        <div class="login-card">
            <div class="login-hero">
                <div class="emoji">🛍️</div>
                <h2>ShopEase</h2>
                <p>Your one-stop destination for everything you love. Shop the latest trends with amazing deals.</p>
            </div>
            <div class="login-form-side">
                <h1>Welcome Back!</h1>
                <p class="subtitle">Sign in to your account to continue</p>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrap">
                            <span class="input-icon">👤</span>
                            <input type="text" id="firstNameInput" placeholder="First name" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrap">
                            <span class="input-icon">👤</span>
                            <input type="text" id="lastNameInput" placeholder="Last name" />
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrap">
                        <span class="input-icon">📱</span>
                        <input type="tel" id="phoneInput" placeholder="Enter your phone number" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <span class="input-icon">📧</span>
                        <input type="email" id="emailInput" placeholder="Enter your email" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="passwordInput" placeholder="Enter your password" />
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" checked /> Remember me</label>
                    <a href="#" onclick="showToast('Password reset link sent!');return false;">Forgot Password?</a>
                </div>
                <button id="signin-btn" class="btn btn-primary-full" onclick="loginSuccess()">Sign In →</button>
                <div class="divider">Or continue with</div>
                <div class="social-row">
                    <button class="btn-social" onclick="loginSuccess()"><span
                            style="color:#4285F4;font-weight:800;">G</span>
                        Google</button>
                    <button class="btn-social" onclick="loginSuccess()"><span
                            style="color:#1877F2;font-weight:800;">f</span>
                        Facebook</button>
                </div>
                <div class="login-footer">Don't have an account? <a href="#"
                        onclick="showToast('Sign Up - Coming soon!');return false;">Sign Up</a></div>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        function loginSuccess() {
            window.location.href = 'index.html?loggedIn=true';
        }
    </script>
</body>

</html>
